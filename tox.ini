[tox]
envlist = py311, lint
skip_missing_interpreters = true

[testenv]
skip_install = true
deps =
    -r requirments.txt
    pytest>=8
    pytest-asyncio>=0.24
commands =
    pytest {posargs}

[testenv:lint]
skip_install = true
deps = ruff>=0.9
commands =
    ruff check src/
    ruff format --check src/

[pytest]
asyncio_mode = auto
testpaths = tests

[flake8]
max-line-length = 120
extend-ignore = E501
